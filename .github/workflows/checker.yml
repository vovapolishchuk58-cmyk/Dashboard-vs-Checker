name: Product Availability Checker

on:
  schedule:
    # Запуск кожні 2 години (UTC). Мінімальний інтервал у GitHub Actions — 5 хвилин,
    # але для стабільності рекомендується не частіше ніж кожну годину.
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Можливість запустити вручну через GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Максимальний час виконання джобу

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run product checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import asyncio
          from checker import check_products
          asyncio.run(check_products(max_runtime=500))
          "
